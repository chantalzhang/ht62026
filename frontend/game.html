<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Rocky RPS</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      font-family: "Arial Black", Impact, Arial, sans-serif;
    }
    svg {
      width: 100vw;
      height: 100vh;
      display: block;
      animation: pageIn 1100ms ease-out both;
    }
    .score { font-size: 54px; font-weight: 900; }
    .label { font-size: 30px; font-weight: 900; letter-spacing: 1px; }
    .result { font-size: 30px; font-weight: 900; }
    .small { font-size: 21px; font-weight: 900; }
    .rocky-pop { animation: pop 900ms ease-in-out infinite alternate; transform-origin: 325px 390px; }
    #rockyFist.counting { animation: rpsPump 740ms ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    #shootOverlay.play { animation: shootReveal 1500ms cubic-bezier(.2, .85, .2, 1) forwards; transform-box: view-box; transform-origin: 0 0; }
    #flashOverlay.play { animation: cameraFlash 650ms ease-out forwards; }
    #score.bump { animation: scoreBump 1100ms ease-out; }
    #plusOne.show { opacity: 1; animation: plusOne 1300ms ease-out forwards; }
    #scoreGroup.compact { animation: scoreOut 500ms ease-in forwards; }
    #compactScore { opacity: 0; transform: translateX(-30px); transition: all 500ms ease-out; }
    #endActions { opacity: 0; transform: translateX(30px); transition: all 500ms ease-out; }
    #shootOverlay, #flashOverlay { pointer-events: none; }
    #giveUpButton { animation: pop 900ms ease-in-out infinite alternate; transform-origin: 1095px 70px; cursor: pointer; pointer-events: all; }
    #compactScore.show, #endActions.show { opacity: 1; transform: translateX(0); }
    @keyframes pageIn {
      from { opacity: .35; filter: blur(6px); }
      to { opacity: 1; filter: blur(0); }
    }
    @keyframes pop { from { transform: scale(1) rotate(-1.4deg); } to { transform: scale(1.035) rotate(-.4deg); } }
    @keyframes rpsPump {
      0% { transform: translate(-10px, -18px) rotate(-7deg); }
      50% { transform: translate(16px, 20px) rotate(7deg); }
      100% { transform: translate(-10px, -18px) rotate(-7deg); }
    }
    @keyframes scoreBump { 35% { transform: scale(1.45); } 100% { transform: scale(1); } }
    @keyframes plusOne { 0% { opacity: 0; transform: translateY(14px); } 25% { opacity: 1; } 100% { opacity: 0; transform: translateY(-30px); } }
    @keyframes scoreOut { to { opacity: 0; transform: translateX(-260px); } }
    @keyframes cameraFlash {
      0% { opacity: 0; }
      12% { opacity: .85; }
      100% { opacity: 0; }
    }
    @keyframes shootReveal {
      0% { opacity: 1; transform: translate(0, 0) scale(1, 1); }
      35% { opacity: 1; transform: translate(0, 0) scale(1, 1); }
      82% { opacity: 1; transform: translate(725px, 275px) scale(.36, .38); }
      100% { opacity: 0; transform: translate(725px, 275px) scale(.36, .38); }
    }
  </style>
</head>
<body>
<svg viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Rocky RPS game UI">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="4" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <filter id="bgBlur">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="saturate" values="0.48"/>
    </filter>
    <clipPath id="rockyFistClip">
      <rect x="95" y="275" width="460" height="275" rx="16"/>
    </clipPath>
    <clipPath id="youClip">
      <rect x="725" y="275" width="460" height="275" rx="16"/>
    </clipPath>
  </defs>

  <image href="assets/boxing_ring.jpg" x="-24" y="-24" width="1328" height="768" preserveAspectRatio="xMidYMid slice" filter="url(#bgBlur)"/>
  <rect x="0" y="0" width="1280" height="430" fill="#D8CEC0" opacity="0.12"/>
  <rect width="1280" height="720" fill="#000000" opacity="0.12"/>

  <g id="scoreGroup" filter="url(#shadow)">
    <path d="M165 34 L545 26 L570 112 L190 122 Z" fill="#D94A4A" stroke="#0B0B0B" stroke-width="8"/>
    <path d="M735 26 L1115 34 L1090 122 L710 112 Z" fill="#3F7FCB" stroke="#0B0B0B" stroke-width="8"/>
    <path d="M548 42 L732 42 L710 102 L570 102 Z" fill="#EFCB4A" stroke="#0B0B0B" stroke-width="7"/>
    <text x="270" y="78" text-anchor="middle" class="small" fill="#FFFFFF" stroke="#0B0B0B" stroke-width="4" paint-order="stroke">ROCKY</text>
    <text id="score" x="450" y="95" text-anchor="middle" class="score" fill="#FFFFFF" stroke="#0B0B0B" stroke-width="6" paint-order="stroke">00</text>
    <text id="plusOne" x="520" y="55" text-anchor="middle" class="result" fill="#EFCB4A" stroke="#0B0B0B" stroke-width="5" paint-order="stroke" opacity="0">+1</text>
    <text x="640" y="82" text-anchor="middle" class="small" fill="#0B0B0B">SCORE</text>
    <text x="835" y="78" text-anchor="middle" class="small" fill="#FFFFFF" stroke="#0B0B0B" stroke-width="4" paint-order="stroke">YOU</text>
    <text x="1010" y="95" text-anchor="middle" class="score" fill="#FFFFFF" stroke="#0B0B0B" stroke-width="6" paint-order="stroke">00</text>
  </g>

  <g id="countdownGroup" filter="url(#shadow)" style="display:none">
    <path d="M360 30 L920 30 L955 104 L892 128 L390 128 L325 94 Z" fill="#EFCB4A" stroke="#0B0B0B" stroke-width="8"/>
    <text id="countdownText" x="640" y="95" text-anchor="middle" class="score" fill="#0B0B0B">ROCK</text>
  </g>

  <g id="compactScore" filter="url(#shadow)">
    <rect x="58" y="36" width="260" height="78" rx="24" fill="#0B0B0B" stroke="#FFFFFF" stroke-width="3"/>
    <text id="compactScoreText" x="188" y="88" text-anchor="middle" class="result" fill="#FFFFFF">0 - 0</text>
  </g>

  <g id="endActions" filter="url(#shadow)">
    <text x="640" y="78" text-anchor="middle" class="small" fill="#FFFFFF" stroke="#0B0B0B" stroke-width="4" paint-order="stroke">SPACE TO TRY AGAIN</text>
    <g id="giveUpButton" onclick="window.location.href='/white-flag.html'">
      <rect x="1015" y="42" width="160" height="56" rx="18" fill="#D94A4A" stroke="#0B0B0B" stroke-width="5"/>
      <text x="1095" y="78" text-anchor="middle" class="small" fill="#FFFFFF" stroke="#0B0B0B" stroke-width="3" paint-order="stroke">GIVE UP</text>
    </g>
  </g>

  <g id="rockyCard" class="rocky-pop" filter="url(#shadow)">
    <rect x="55" y="200" width="540" height="440" rx="30" fill="#D94A4A" stroke="#0B0B0B" stroke-width="9"/>
    <text x="325" y="248" text-anchor="middle" class="label" fill="#FFFFFF" stroke="#0B0B0B" stroke-width="6" paint-order="stroke">ROCKY</text>
    <g id="rockyFistGroup">
      <rect x="95" y="275" width="460" height="275" rx="16" fill="#B6B6B6"/>
      <g clip-path="url(#rockyFistClip)">
        <image id="rockyFist" href="assets/rocky_closed_fist.png" x="120" y="245" width="410" height="335" preserveAspectRatio="xMidYMid meet"/>
      </g>
      <rect x="95" y="275" width="460" height="275" rx="16" fill="none" stroke="#0B0B0B" stroke-width="2"/>
    </g>
    <rect id="rockyMoveBox" x="145" y="275" width="360" height="275" rx="16" fill="#181820" stroke="#FFFFFF" stroke-width="5" style="display:none"/>
    <image id="rockyMove" href="" x="185" y="270" width="280" height="280" preserveAspectRatio="xMidYMid meet" style="display:none"/>
    <rect id="resultPill" x="120" y="575" width="410" height="46" rx="16" fill="#EFCB4A" stroke="#0B0B0B" stroke-width="5" style="display:none"/>
    <text id="resultText" x="325" y="608" text-anchor="middle" class="small" fill="#0B0B0B" style="display:none">ROCKY WINS!</text>
  </g>

  <g filter="url(#shadow)" transform="rotate(1.5 955 390)">
    <rect x="685" y="200" width="540" height="440" rx="30" fill="#3F7FCB" stroke="#0B0B0B" stroke-width="9"/>
    <text x="955" y="248" text-anchor="middle" class="label" fill="#FFFFFF" stroke="#0B0B0B" stroke-width="6" paint-order="stroke">YOU</text>
    <rect id="youBox" x="725" y="275" width="460" height="275" rx="16" fill="#15151D"/>
    <g clip-path="url(#youClip)">
      <image id="camera" href="/video" x="725" y="275" width="460" height="275" preserveAspectRatio="xMidYMid slice"/>
      <image id="youMove" href="" x="815" y="288" width="280" height="280" style="display:none"/>
    </g>
    <rect x="725" y="275" width="460" height="275" rx="16" fill="none" stroke="#0B0B0B" stroke-width="2"/>
    <rect x="750" y="575" width="410" height="46" rx="16" fill="#0B0B0B" opacity="0.88"/>
    <text id="youText" x="955" y="608" text-anchor="middle" class="small" fill="#FFFFFF">PRESS SPACE</text>
  </g>

  <g filter="url(#shadow)">
    <polygon points="640,345 662,372 700,365 680,398 706,430 665,426 648,466 625,430 585,440 604,402 575,374 618,375" fill="#EFCB4A" stroke="#0B0B0B" stroke-width="8" stroke-linejoin="round"/>
    <text x="640" y="405" text-anchor="middle" dominant-baseline="middle" class="result" fill="#0B0B0B">VS</text>
  </g>

  <g id="shootOverlay" style="display:none">
    <image id="lockedFrame" href="" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
    <rect width="1280" height="720" fill="#000000" opacity="0.18"/>
  </g>
  <rect id="flashOverlay" width="1280" height="720" fill="#FFFFFF" opacity="0"/>
</svg>

<script>
const bg = { rock: '#181820', paper: '#2F7D4F', scissors: '#3B1B5E' };
const img = move => move ? `assets/${move}.png` : '';
let lastLockId = 0;
let shownScore = 0;
let compactTimer = null;

async function control(key) {
  await fetch(`/control?key=${encodeURIComponent(key)}`);
}
function resetEndUi() {
  clearTimeout(compactTimer);
  scoreGroup.classList.remove('compact');
  compactScore.classList.remove('show');
  endActions.classList.remove('show');
  plusOne.classList.remove('show');
}
function animateScore(newScore) {
  score.textContent = String(shownScore).padStart(2, '0');
  setTimeout(() => {
    shownScore = newScore;
    score.textContent = String(shownScore).padStart(2, '0');
    score.classList.remove('bump');
    plusOne.classList.remove('show');
    void score.getBoundingClientRect();
    score.classList.add('bump');
    plusOne.classList.add('show');
  }, 300);
  compactTimer = setTimeout(() => {
    compactScoreText.textContent = `${shownScore} - 0`;
    scoreGroup.classList.add('compact');
    compactScore.classList.add('show');
    endActions.classList.add('show');
  }, 2300);
}

document.addEventListener('keydown', e => {
  if (e.key === ' ') control('space');
  if (e.key === 'r') control('r');
  if (e.key === 'c') control('c');
  if (e.key === 'q') control('q');
});
giveUpButton.addEventListener('click', () => {
  window.location.href = '/white-flag.html';
});

async function tick() {
  const s = await fetch('/state').then(r => r.json());
  if (!s.locked && s.score !== shownScore) {
    shownScore = s.score;
    score.textContent = String(shownScore).padStart(2, '0');
  }

  const counting = s.state === 'COUNTDOWN';
  scoreGroup.style.display = counting ? 'none' : 'block';
  countdownGroup.style.display = counting ? 'block' : 'none';
  if (s.countdown_word) countdownText.textContent = s.countdown_word;
  rockyFist.classList.toggle('counting', counting);

  if (s.locked && s.lock_id !== lastLockId) {
    lastLockId = s.lock_id;
    resetEndUi();
    animateScore(s.score);
    lockedFrame.setAttribute('href', `/locked_frame?id=${s.lock_id}`);
    shootOverlay.style.display = 'block';
    shootOverlay.classList.remove('play');
    void shootOverlay.getBoundingClientRect();
    shootOverlay.classList.add('play');
    flashOverlay.classList.remove('play');
    void flashOverlay.getBoundingClientRect();
    flashOverlay.classList.add('play');
    setTimeout(() => shootOverlay.style.display = 'none', 1500);
  }

  if (s.locked) {
    rockyFistGroup.style.display = 'none';
    rockyMoveBox.style.display = 'block';
    rockyMove.style.display = 'block';
    rockyMove.setAttribute('href', img(s.rocky_move));
    rockyMoveBox.setAttribute('fill', bg[s.rocky_move]);

    camera.style.display = 'none';
    youMove.style.display = 'block';
    youMove.setAttribute('href', img(s.locked));
    youBox.setAttribute('fill', bg[s.locked]);

    resultPill.style.display = 'block';
    resultText.style.display = 'block';
    resultText.textContent = (s.result || 'Rocky wins').toUpperCase() + '!';
    youText.textContent = `THREW: ${s.locked.toUpperCase()}`;
  } else {
    resetEndUi();
    rockyFistGroup.style.display = 'block';
    rockyMoveBox.style.display = 'none';
    rockyMove.style.display = 'none';

    camera.style.display = 'block';
    youMove.style.display = 'none';
    youBox.setAttribute('fill', '#15151D');

    resultPill.style.display = 'none';
    resultText.style.display = 'none';
    youText.textContent = counting ? s.countdown_word : s.state === 'ARMED' ? `STABLE: ${s.stable}` : 'PRESS SPACE';
  }
}

setInterval(tick, 120);
tick();
</script>
</body>
</html>
