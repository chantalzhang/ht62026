<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Rocky</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #D9C65E;
      font-family: "Arial Black", Impact, Arial, sans-serif;
      overflow: hidden;
    }
    .page {
      width: min(1220px, 96vw);
      height: min(690px, 96vh);
      position: relative;
      display: grid;
      grid-template-rows: 1fr auto;
      align-items: center;
    }
    .tagline {
      text-align: center;
      font-size: 36px;
      font-weight: 900;
      color: #111;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .lineup {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 28px;
      padding-top: 0;
      transform: translate(-28px, -34px);
    }
    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .character {
      width: 255px;
      image-rendering: auto;
      animation: bounce 4s ease-in-out infinite;
    }
    .paper { transform: translateX(-14px); }
    .paper .character { animation-delay: 1s; }
    .scissors { transform: translateX(4px); }
    .scissors .character { animation-delay: 2s; width: 220px; }
    .shoot { margin-left: 110px; transform: translateX(26px); }
    .shoot .word-label { transform: translateX(78px); }
    .shoot .character { animation-delay: 3s; width: 320px; }

    .word-label {
      min-height: 26px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #111;
      text-shadow: 0 2px 0 rgba(255,255,255,.65);
      opacity: 0;
      animation: word 4s steps(1, end) infinite;
      display: inline-block;
      padding-bottom: 4px;
      border-bottom: 5px solid currentColor;
    }
    .rock .word-label { animation-name: word1; color: #181820; }
    .paper .word-label { animation-name: word2; color: #2F7D4F; }
    .scissors .word-label { animation-name: word3; color: #3B1B5E; transform: translateX(12px); }
    .shoot .word-label { animation-name: word4; color: #D94A4A; }

    .hint {
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 28px;
      color: #111;
      opacity: .78;
      text-transform: uppercase;
    }

    @keyframes bounce {
      0%, 18%, 100% { transform: translateY(0) rotate(-1deg); }
      8% { transform: translateY(-34px) rotate(2deg); }
    }
    @keyframes word1 { 0%, 99% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes word2 { 0%, 24% { opacity: 0; } 25%, 99% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes word3 { 0%, 49% { opacity: 0; } 50%, 99% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes word4 { 0%, 74% { opacity: 0; } 75%, 99% { opacity: 1; } 100% { opacity: 0; } }
  </style>
</head>
<body>
  <main class="page">
    <section class="lineup" aria-label="Rock paper scissors shoot characters">
      <div class="item rock">
        <img class="character" src="assets/landing_rock.png" alt="Rock" />
        <div class="word-label">rock</div>
      </div>
      <div class="item paper">
        <img class="character" src="assets/landing_paper.png" alt="Paper" />
        <div class="word-label">paper</div>
      </div>
      <div class="item scissors">
        <img class="character" src="assets/landing_scissors.png" alt="Scissors" />
        <div class="word-label">scissors</div>
      </div>
      <div class="item shoot">
        <img class="character" src="assets/landing_shoot.png" alt="Shoot" />
        <div class="word-label">shoot</div>
      </div>
    </section>

    <div>
      <div class="tagline">ROCKY NEVER LOSES</div>
      <div class="hint">PRESS SPACE TO CHALLENGE HIM</div>
    </div>
  </main>

  <script>
    document.addEventListener('keydown', event => {
      if (event.key === ' ') window.location.href = '/game.html';
    });
  </script>
</body>
</html>
