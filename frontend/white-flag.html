<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>White Flag</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #FFFFFF;
      overflow: hidden;
    }
    body {
      display: grid;
      place-items: center;
    }
    .flag {
      width: min(56vw, 520px);
      height: auto;
      display: block;
      animation: flagFade 3.2s cubic-bezier(.25, .8, .25, 1) forwards;
    }
    .red-fade {
      position: fixed;
      inset: 0;
      background: #D94A4A;
      opacity: 0;
      pointer-events: none;
      animation: redFade 3.2s ease-in-out forwards;
    }
    @keyframes flagFade {
      0% { opacity: 0; filter: blur(5px); transform: scale(1.025); }
      18% { opacity: 1; filter: blur(0); transform: scale(1); }
      58% { opacity: 1; filter: blur(0); transform: scale(1); }
      100% { opacity: 0; filter: blur(2px); transform: scale(.995); }
    }
    @keyframes redFade {
      0%, 52% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <img class="flag" src="assets/white_flag.gif" alt="White flag" />
  <div class="red-fade"></div>

  <script>
    setTimeout(() => {
      window.location.href = '/give-up.html';
    }, 3200);
  </script>
</body>
</html>
