<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Rocky Never Loses</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
    }
    body {
      overflow: hidden;
      background: #D94A4A;
      color: #FFFFFF;
      font-family: "Arial Black", Impact, Arial, sans-serif;
      text-align: center;
    }
    .screen {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    .main {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      color: #0B0B0B;
      font-size: clamp(36px, 6.8vw, 92px);
      line-height: 1;
      letter-spacing: 4px;
    }
    .never {
      display: inline-block;
      border-bottom: .08em solid #0B0B0B;
      animation: neverBounce 900ms ease-in-out infinite alternate;
    }
    .bottom {
      position: absolute;
      right: 130px;
      bottom: 170px;
      font-size: clamp(24px, 3.8vw, 52px);
      letter-spacing: 2px;
      text-shadow: 0 4px 0 #0B0B0B;
    }
    @keyframes neverBounce {
      from { transform: translateY(0) rotate(-1deg); }
      to { transform: translateY(-10px) rotate(1deg); }
    }
  </style>
</head>
<body>
  <main class="screen">
    <div class="main">ROCKY&nbsp;<span class="never">NEVER</span>&nbsp;LOSES</div>
    <div class="bottom">NICE TRY.</div>
  </main>
  <audio id="finalTheme" src="assets/sounds/final_theme.mp3" preload="auto" autoplay loop playsinline></audio>

  <script>
    const finalTheme = document.getElementById('finalTheme');
    finalTheme.volume = 0.85;

    function playFinalTheme() {
      finalTheme.muted = false;
      finalTheme.play().catch(() => {});
    }

    playFinalTheme();
    document.addEventListener('pointerdown', playFinalTheme);
    document.addEventListener('touchstart', playFinalTheme);
    document.addEventListener('keydown', playFinalTheme);
  </script>
</body>
</html>
